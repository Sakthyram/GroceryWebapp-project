<!DOCTYPE html>
<html>
<head>
    <title>GSMS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="csrf-token" content="{{ csrf_token() }}"/>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Material Icons (optional) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">


    <style>
        body {
            background-image: url('Image/gsms.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;  
            background-size: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fa fa-list-alt" title="Orders"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="manage-product.html">
                            <i class="fa fa-box" title="Products"></i> 
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<form>
    <!-- First Card (Order Header + Labels) -->
<div class="d-flex justify-content-center align-items-start">
  <div class="card mx-auto mt-4 shadow-lg bg-white w-100"
       style="max-width: 1200px; border-radius: 12px;">

    <!-- Card Header -->

      <div class="card-header text-dark">
        <h1 class="h4 text-start new-order">
          New Order
          
          <!--Customer Name Input-->
            <input name="customerName" id="customerName" type="text" placeholder="Customer Name"
                  class="form-control d-inline-block ms-2 mb-1"
                  style="max-width:230px; float: right;">
        </h1>
      </div>

      <!-- Card Body -->
      <div class="card-body">
        <div class="row mb-2 align-items-center text-center">
          <div class="col-sm-4">
            <label class="form-label mb-0 float-start">Product</label>
          </div>
          <div class="col-sm-3">
            <label class="form-label mb-0 float-start">Price</label>
          </div>
          <div class="col-sm-2">
            <label class="form-label mb-0 float-start">Quantity</label>
          </div>
          <div class="col-sm-3 d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">Total</label>
            <button class="btn btn-sm btn-primary" type="button" id="addMoreButton">
              Add More
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="product-box-extra" id="itemsInOrder">

  </div>

  <!-- Third Card (Total Row) -->
  <div class="d-flex justify-content-center align-items-start">
    <div class="card mx-auto mt-3 shadow-sm bg-white w-100"
        style="max-width: 1200px; border-radius: 12px;">
      <div class="card-body">

        <div class="row align-items-center">
          <div class="col-sm-9 text-end">
            <strong>Total:</strong>
          </div>
          <div class="col-sm-3 d-flex align-items-center">
            <div class="input-group me-3">
              <span class="input-group-text">Rs</span>
              <input type="text" id="product_grand_total" name="product_grand_total" class="form-control text-center me-3" value="0.0" readonly>
            </div>
            <button class="btn btn-sm btn-primary" id="saveOrder">  Save  </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</form>


<!-- Second Card (Product Row) -->
<div class="product-box d-none">
<div class="d-flex justify-content-center align-items-start">
  <div class="card mx-auto mt-3 shadow-sm bg-white w-100 disappear"
       style="max-width: 1200px; border-radius: 12px;">
    <div class="card-body">

      <!-- One product row -->
      <div class="row mb-3 align-items-center text-center product-item">

        <!-- Product dropdown -->
        <div class="col-sm-4">
          <select name="product" class="form-select cart-product"></select>
        </div>

        <!-- Price -->
        <div class="col-sm-3">
          <input id="product_price" name="product_price" class="form-control product-price" value="0.0" readonly>
        </div>

        <!-- Quantity -->
        <div class="col-sm-2">
          <input type="number" min="1" value="1" name="qty" class="form-control product-qty">
        </div>

        <!-- Total + Remove button -->
        <div class="col-sm-3 d-flex align-items-center">
          <div class="input-group me-3">
            <span class="input-group-text">Rs</span>
            <input type="text" name="item_total" id="item_total" class="form-control text-center product-total" aria-label="Amount" value="0.0" readonly>
          </div>
          <button class="btn btn-sm btn-danger remove-row"> Remove </button>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/order.js"></script>
</body>
</html>
