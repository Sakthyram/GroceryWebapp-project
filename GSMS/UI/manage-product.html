<!DOCTYPE html>
<html>
<head>
    <title>GSMS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="csrf-token" content="{{ csrf_token() }}"/>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Material Icons (optional) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">


    <style>
        body {
            background-image: url('Image/gsms.jpg');
            background-repeat: no-repeat;
            background-attachment: fixed;  
            background-size: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fa fa-list-alt" title="Orders"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="manage-product.html">
                            <i class="fa fa-box" title="Products"></i> 
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="d-flex justify-content-center align-items-start min-vh-100">
      <div class="card mx-auto mt-4 shadow-lg bg-white w-100" style="max-width: 1200px; border-radius: 12px;">
        <!--Card header-->
          <div class="card-header text-center text-dark">
            <h1 class="h4 text-start">Manage Products</h1>
          </div>
        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <!--Add new product Button-->
        <button type="button" class="btn btn-primary me-3 mt-3" data-bs-toggle="modal" data-bs-target="#addProductModal">
          Add New Product
        </button>
      </div>
      <!--Card body-->
      <div class="card-body">
        <table class="table table-bordered table-striped text-center">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Unit</th>
              <th>Price Per Unit</th>
              <th style="width: 150px">Action</th>
            </tr>
          </thead>
          <tbody>


          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!--Product Modal-->
<div class="modal fade" id="addProductModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <!--Modal Title-->
        <h4 class="modal-title">Add New Product</h4>
      </div>
      <!--Modal Body-->
      <div class="modal-body">
        <form id="productForm">
          <!--Product Id-->
          <input type="hidden" name="id" id="id" value="0">
          <!--Name-->
            <div class="mb-3">
              <label for="Product-name" class="col-form-label">Name:</label>
              <input type="text" class="form-control" id="Product-name" name="name">
            </div>
            <!--Unit-->
            <div class="mb-3">
              <label for="uom" class="col-form-label">Unit:</label>
              <select type="text" class="form-select" id="uom" name="uoms"></select>
            </div>
            <!--Price Per Price-->
            <div class="mb-3">
              <label for="Price" class="col-form-label">Price Per Unit:</label>
              <input type="text" class="form-control" id="Price" name="price">
          </div>
        </form>
      </div>
<!--Modal footer-->
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
  <button type="button" class="btn btn-primary" id="saveProduct">Save</button>
</div>
</div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/manage-product.js"></script>
</body>
</html>
